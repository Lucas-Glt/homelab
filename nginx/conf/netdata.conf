server {
	listen 80;
	server_name netdata.espacenum.fr;

	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	server_name netdata.espacenum.fr;

	 ssl_certificate /etc/letsencrypt/live/netdata.espacenum.fr/fullchain.pem;
	 ssl_certificate_key /etc/letsencrypt/live/netdata.espacenum.fr/privkey.pem;

    location / {
        proxy_pass http://netdata:19999;
	auth_basic "accès restreint";
	auth_basic_user_file /etc/nginx/auth/.htpasswd;
    }
}
